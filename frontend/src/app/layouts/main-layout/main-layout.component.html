<div class="main-shell">
  <aside class="sidebar">
    <div class="sidebar__brand">Темы ВКР</div>
    <nav class="sidebar__nav">
      <a routerLink="/topics" routerLinkActive="is-active">Темы</a>
    </nav>
  </aside>
  <div class="main-area">
    <header class="topbar">
      <span class="topbar__title">Сервис выбора темы</span>
      <span class="topbar__user">{{ currentUser()?.email }}</span>
      <p-button label="Выйти" severity="secondary" (onClick)="logout()" />
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
