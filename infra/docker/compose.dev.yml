# Сторонние образы с фиксированными тегами (без :latest) для воспроизводимости сборок.
services:
  postgres:
    image: postgres:16.8-bookworm
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_DB: app_database
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d:ro
      - ../db/backups:/backups
    secrets:
      - postgres_password
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_database"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"  # Для локального доступа к БД (pgAdmin и т.д.)

  redis:
    image: redis:7.4-alpine
    container_name: redis_cache
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "PASS=$$(cat /run/secrets/redis_password | tr -d '\\r\\n'); exec redis-server --requirepass \"$$PASS\""
    volumes:
      - redis_data:/data
    secrets:
      - redis_password
    networks:
      - backend_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PASS=$$(cat /run/secrets/redis_password | tr -d '\\r\\n'); redis-cli -a \"$$PASS\" ping | grep -q PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"  # Для локального доступа

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - minio.env
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    volumes:
      - minio_data:/data
    secrets:
      - minio_access_key
      - minio_secret_key
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: backend_app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=app_database;Username=app_user"
      Db__PasswordFile: /run/secrets/postgres_password
      Redis__ConnectionString: "redis:6379"
      Redis__PasswordFile: /run/secrets/redis_password
      S3__Provider: "S3"
      S3__Endpoint: "http://minio:9000"
      S3__PublicEndpoint: "http://localhost:9000"
      S3__Region: "us-east-1"
      S3__BucketName: "graduate-works"
      S3__ForcePathStyle: "true"
      S3__AccessKeyFile: /run/secrets/minio_access_key
      S3__SecretKeyFile: /run/secrets/minio_secret_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    secrets:
      - postgres_password
      - redis_password
      - minio_access_key
      - minio_secret_key
    ports:
      - "5001:80"
    networks:
      - backend_network

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    restart: unless-stopped
    # Прокси /api → backend задан в frontend/nginx.conf (upstream backend:80).
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - backend_network

  # --- Метрики (Prometheus / Grafana) — отключено до отдельной настройки ---
  # prometheus:
  #   image: prom/prometheus:v2.55.1
  #   container_name: prometheus
