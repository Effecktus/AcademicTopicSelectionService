  #     - monitoring_network
  #
  # grafana:
  #   image: grafana/grafana:11.5.2
  #   container_name: grafana
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - grafana_data:/var/lib/grafana
  #   depends_on:
  #     - prometheus
  #   networks:
  #     - monitoring_network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  # prometheus_data:
  # grafana_data:

networks:
  backend_network:
    driver: bridge
  # monitoring_network:
  #   driver: bridge

secrets:
  postgres_password:
    file: ../docker/secrets/postgres_password.txt
  redis_password:
    file: ../docker/secrets/redis_password.txt
  minio_access_key:
    file: ../docker/secrets/minio_access_key.txt
  minio_secret_key:
    file: ../docker/secrets/minio_secret_key.txt