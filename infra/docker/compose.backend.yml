services:
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    volumes:
      - minio_data:/data
    secrets:
      - minio_access_key
      - minio_secret_key
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "9000:9000"
      - "9001:9001"

  redis:
    image: redis:7
    container_name: redis_cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}
    volumes:
      - redis_data:/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6380:6379"  # 6380 на хосте, чтобы не конфликтовать с локальным Redis

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_DB: app_database
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d:ro
      - ../db/backups:/backups
    secrets:
      - postgres_password
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_database"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5433:5432" # доступ к БД с хоста без конфликта с локальным Postgres

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: backend_app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=app_database;Username=app_user"
      Db__PasswordFile: /run/secrets/postgres_password
      Redis__ConnectionString: "redis:6379"
      Redis__PasswordFile: /run/secrets/redis_password
      Email__Provider: "${EMAIL_PROVIDER:-Smtp}"
      Smtp__Host: "${SMTP_HOST:-smtp.yandex.ru}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromAddress: "${SMTP_FROM_ADDRESS:-}"
      Smtp__EnableSsl: "${SMTP_ENABLE_SSL:-true}"
      S3__Provider: "${S3_PROVIDER:-S3}"
      S3__Endpoint: "${S3_ENDPOINT:-http://minio:9000}"
      S3__PublicEndpoint: "${S3_PUBLIC_ENDPOINT:-http://localhost:9000}"
      S3__Region: "${S3_REGION:-us-east-1}"
      S3__BucketName: "${S3_BUCKET_NAME:-graduate-works}"
      S3__ForcePathStyle: "${S3_FORCE_PATH_STYLE:-true}"
      S3__AccessKeyFile: /run/secrets/minio_access_key
      S3__SecretKeyFile: /run/secrets/minio_secret_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    secrets:
      - postgres_password
      - redis_password
      - minio_access_key
      - minio_secret_key
    ports:
      - "5001:80"
    networks:
      - backend_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  backend_network:
    driver: bridge

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  minio_access_key:
    file: ./secrets/minio_access_key.txt
  minio_secret_key:
    file: ./secrets/minio_secret_key.txt
