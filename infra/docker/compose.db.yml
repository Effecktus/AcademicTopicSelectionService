services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_DB: app_database
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d:ro  # Init скрипты
      - ../db/backups:/backups
      - ../db/migrations:/migrations:ro  # Для миграций
    secrets:
      - postgres_password
    networks:
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_database"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5433:5432"  # Доступ с хоста (5433 чтобы избежать конфликта с локальным PostgreSQL)

volumes:
  postgres_data:

networks:
  db_network:
    driver: bridge

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt