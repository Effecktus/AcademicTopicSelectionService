name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/src/DirectoryOfGraduates.API/DirectoryOfGraduates.API.csproj

      - name: Build
        run: dotnet build backend/src/DirectoryOfGraduates.API/DirectoryOfGraduates.API.csproj --no-restore -c Release
