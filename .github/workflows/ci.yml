name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/AcademicTopicSelectionService.slnx

      - name: Build
        run: dotnet build backend/AcademicTopicSelectionService.slnx --no-restore -c Release

      - name: Unit tests
        run: >
          dotnet test backend/tests/AcademicTopicSelectionService.UnitTests/AcademicTopicSelectionService.UnitTests.csproj
          --no-build -c Release
          --logger "console;verbosity=normal"

      - name: Integration tests
        env:
          # Отключаем Ryuk-контейнер для очистки ресурсов: на CI он может вызывать
          # нестабильность из-за ограничений прав на Docker socket.
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: >
          dotnet test backend/tests/AcademicTopicSelectionService.IntegrationTests/AcademicTopicSelectionService.IntegrationTests.csproj
          --no-build -c Release
          --logger "console;verbosity=normal"
