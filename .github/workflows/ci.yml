name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/AcademicTopicSelectionService.slnx

      - name: Build
        run: dotnet build backend/AcademicTopicSelectionService.slnx --no-restore -c Release

      - name: Unit tests
        run: >
          dotnet test backend/tests/AcademicTopicSelectionService.UnitTests/AcademicTopicSelectionService.UnitTests.csproj
          --no-build -c Release
          --logger "console;verbosity=normal"

      - name: Integration tests
        env:
          # Отключаем Ryuk-контейнер для очистки ресурсов: на CI он может вызывать
          # нестабильность из-за ограничений прав на Docker socket.
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: >
          dotnet test backend/tests/AcademicTopicSelectionService.IntegrationTests/AcademicTopicSelectionService.IntegrationTests.csproj
          --no-build -c Release
          --logger "console;verbosity=normal"

  build-and-test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Unit tests
        run: npx ng test --no-watch --browsers=ChromeHeadless
        working-directory: frontend
